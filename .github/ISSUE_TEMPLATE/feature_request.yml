name: Feature request
description: Suggest new documentation or an improvement to the site.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: checkboxes
    id: checks
    attributes:
      label: Before you start
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: What is missing or hard to find?
      description: Describe what you were trying to learn and where you looked.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed content or change
      description: An outline of the guide, page, or site feature you have in mind.
    validations:
      required: true

  - type: checkboxes
    id: contribute
    attributes:
      label: Contribution
      options:
        - label: I am willing to open a pull request for this.
          required: false
